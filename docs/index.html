<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3/OBS Connect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #172033;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f6f7f9;
        }
        .card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 12px 30px rgba(20, 31, 49, 0.12);
            text-align: center;
            max-width: 560px;
        }
        .mark {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: #1769c2;
            color: #ffffff;
            font-weight: 800;
            font-size: 24px;
        }
        h1 {
            margin: 0 0 1rem;
            color: #10233c;
        }
        p {
            color: #536177;
            margin: 0 0 2rem;
        }
        a {
            display: inline-block;
            background: #1769c2;
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            transition: background 0.2s;
        }
        a:hover {
            background: #1059a8;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="mark">S3</div>
        <h1>S3/OBS Connect</h1>
        <p>A Chrome extension for opening user-configured S3-compatible OBS buckets in a full browser tab to browse, upload, preview, download, and delete objects.</p>
        <a href="privacy-policy.html">Privacy Policy</a>
    </div>
</body>
</html>
